# =============================================================================
# group_vars/all.yml — deployment variables for all hosts
#
# Secrets (jwt_secret, db_password) should be stored in Ansible Vault:
#   ansible-vault encrypt_string 'your-secret' --name jwt_secret
# =============================================================================

spring_profile: dev

zw_repo_url: "file:///home/user/Documents/github/payments_iso_standard/zw"
capital_repo_url: "file:///home/user/Documents/github/payments_iso_standard/capital"

# Shared JWT secret — must be identical on ZW and Capital (min 32 chars)
jwt_secret: ""        # store with ansible-vault

# PostgreSQL credentials (required for uat/prod)
db_username: ""
db_password: ""       # store with ansible-vault

java_home: /usr/lib/jvm/java-25-openjdk-amd64
